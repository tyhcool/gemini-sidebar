<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Gemini</title>
  <link rel="preconnect" href="https://gemini.google.com">
  <link rel="dns-prefetch" href="https://gemini.google.com">
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background-color: #131314;
      display: flex; justify-content: center; align-items: center;
    }
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #8ab4f8;
      border-radius: 50%;
      width: 40px; height: 40px;
      animation: spin 1s linear infinite;
      position: absolute; z-index: 1;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    iframe {
      width: 100%; height: 100%; border: none;
      position: absolute; z-index: 2;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <iframe id="geminiFrame" src="https://gemini.google.com/app"></iframe>

  <script src="sidebar.js"></script>
</body>
</html>
